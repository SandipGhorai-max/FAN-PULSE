steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/fanpulse-ai-backend:$COMMIT_SHA', './backend']
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/fanpulse-ai-backend:$COMMIT_SHA']
  
  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fanpulse-ai-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/fanpulse-ai-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-secrets=LLM_API_KEY=projects/$PROJECT_ID/secrets/GEMINI_API_KEY:latest'
      - '--add-cloudsql-instances=$_INSTANCE_CONNECTION_NAME'
      - '--set-env-vars=DB_USER=$_DB_USER,DB_NAME=$_DB_NAME'
images:
  - 'gcr.io/$PROJECT_ID/fanpulse-ai-backend:$COMMIT_SHA'
